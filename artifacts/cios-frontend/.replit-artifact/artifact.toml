kind = "web"
previewPath = "/"
title = "CIOS Forecasting Engine"
version = "1.0.0"
id = "artifacts/cios-frontend"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25639
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/cios-frontend run dev"

[services.env]
PORT = "25639"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/cios-frontend", "run", "build"]
publicDir = "artifacts/cios-frontend/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
